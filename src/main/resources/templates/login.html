<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Rutas Arqueológicas</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <style>
    .auth-container { max-width: 400px; margin: 5rem auto; padding: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #8ab4f8; }
    .form-group input {
      width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white;
    }
    .btn-auth {
      width: 100%; padding: 1rem; background: #8ab4f8; color: #121212;
      border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .error-msg { color: #ff6b6b; margin-bottom: 1rem; }
    .success-msg { color: #4ade80; margin-bottom: 1rem; }
    .link-swap { margin-top: 1rem; text-align: center; font-size: 0.85rem; }
    .link-swap a { color: #8ab4f8; text-decoration: none; }
  </style>
</head>
<body>
<div class="auth-container info-card">
  <h2>Iniciar Sesión</h2>

  <div th:if="${param.registrado}" class="success-msg">
    ¡Registro completado! Ya puedes entrar.
  </div>

  <div th:if="${param.error}" class="error-msg">
    Email o contraseña incorrectos.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="username" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn-auth">Entrar</button>
  </form>

  <div class="link-swap">
    ¿No tienes cuenta? <a href="/registro">Regístrate gratis</a>
  </div>
</div>
</body>
</html>
