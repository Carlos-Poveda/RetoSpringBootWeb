<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title th:text="${ruta.properties.nombre}">Detalle de la Ruta</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>

</head>
<body>
<div class="detalle-container">
  <a href="/rutas" class="back-btn">← Volver al listado</a>
  <h1 th:text="${ruta.properties.nombre}">NOMBRE DE LA RUTA</h1>

  <div class="info-grid">
    <div class="info-card">
      <h2>Información General</h2>
      <p><strong>Ubicación:</strong> <span th:text="${ruta.properties.ubicacion ?: 'No disponible'}"></span></p>
      <p><strong>Dirección:</strong> <span th:text="${ruta.properties.direccion ?: 'No disponible'}"></span></p>
      <p><strong>Horario:</strong> <span th:text="${ruta.properties.horario ?: 'No disponible'}"></span></p>
      <p><strong>Teléfono:</strong> <span th:text="${ruta.properties.telefono ?: 'No disponible'}"></span></p>
      <div class="info-seccion">
        <h3>Enlaces de Interés</h3>

        <div th:if="${ruta.properties.web != null and !ruta.properties.web.empty}">
          <p><strong>Página Web Oficial:</strong></p>
          <a th:href="${ruta.properties.web}"
             target="_blank"
             class="btn-web">
            🌐 Visitar Sitio Oficial
          </a>
        </div>

        <div th:unless="${ruta.properties.web != null and !ruta.properties.web.empty}">
          <p class="text-muted"><em>Web oficial no disponible para este emplazamiento.</em></p>
        </div>
      </div>
      <div id="como-llegar-container" style="display: none; margin-top: 15px;">
        <a id="btn-google-maps" href="#" target="_blank" class="btn-llegar">
          📍 Cómo llegar (Google Maps)
        </a>
      </div>
      <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="info-card" style="margin-top: 1rem; border: 1px solid rgba(255, 107, 107, 0.3);">
        <h3 style="color: #ff6b6b; margin-bottom: 1rem;">SOLO ADMIN</h3>
        <form th:action="@{/rutas/eliminar/{id}(id=${ruta.id})}" method="post"
              onsubmit="return confirm('¿Estás seguro de que quieres eliminar esta ruta de forma permanente?');">
          <button type="submit" class="btn-llegar" style="background: rgba(255, 82, 82, 0.2); border-color: #ff5252; color: #ff5252; width: 100%;">
            Eliminar Ruta Permanente
          </button>
        </form>
      </div>
    </div>

    <div id="map"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>

<script th:inline="javascript">
  // Esperamos a que el DOM esté listo para evitar errores de contenedor no encontrado
  document.addEventListener('DOMContentLoaded', function() {
    const utm30n = "+proj=utm +zone=30 +ellps=GRS80 +units=m +no_defs";
    const wgs84 = "EPSG:4326";

    var coordsUtm = [[${ruta.geometry.coordinates}]];

    if (coordsUtm && coordsUtm.length >= 2) {
      // Conversión de metros a grados
      var conversion = proj4(utm30n, wgs84, [coordsUtm[0], coordsUtm[1]]);
      var lat = conversion[1];
      var lon = conversion[0];

// CONFIGURACIÓN DEL BOTÓN "CÓMO LLEGAR"
      var btnMaps = document.getElementById('btn-google-maps');
      var container = document.getElementById('como-llegar-container');

// Creamos la URL de Google Maps con las coordenadas corregidas
      btnMaps.href = "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lon;
      container.style.display = 'block'; // Mostramos el botón ahora que tiene las coordenadas

      var map = L.map('map').setView([lat, lon], 16);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      L.marker([lat, lon]).addTo(map)
              .bindPopup([[${ruta.properties.nombre}]])
              .openPopup();

      // Forzamos a Leaflet a recalcular el tamaño por si acaso
      setTimeout(function(){ map.invalidateSize(); }, 200);



    } else {
      console.error("No se han encontrado coordenadas para esta ruta.");
      document.getElementById('map').innerHTML = "<p style='padding:20px;'>Coordenadas no disponibles para esta ruta.</p>";
    }
  });
</script>
</body>
</html>
